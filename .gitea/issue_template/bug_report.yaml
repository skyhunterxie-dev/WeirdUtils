name: Bug Report
about: Report a crash, error, or unexpected behavior
labels:
  - bug
body:
  - type: dropdown
    id: launcher
    attributes:
      label: Launcher
      options:
        - WoW.exe (direct)
        - VanillaFixes.exe
        - Other
      default: 0
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows
        - Linux (Wine)
        - macOS (Wine/CrossOver)
      default: 0
    validations:
      required: true
  - type: input
    id: dlls
    attributes:
      label: WeirdUtils DLLs in use
      description: Which WeirdUtils DLL(s) are you using?
      placeholder: "e.g. weirdutils.dll, or minimapicons.dll + clickthrough.dll"
    validations:
      required: true
  - type: textarea
    id: other-dlls
    attributes:
      label: Other DLLs loaded
      description: List any other DLLs in your dlls.txt (nampower, SuperWoW, UnitXP, etc.)
      placeholder: |
        nampower.dll
        SuperWoWhook.dll
        UnitXP_SP3.dll
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the issue. Include any error messages or crash details.
      placeholder: "Game crashes on logout with ERROR #132..."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Log in to character
        2. Open mailbox
        3. Game crashes
  - type: textarea
    id: attachments
    attributes:
      label: Crash log and DLLs
      description: |
        Attach your crash log (.txt file from the Errors/ folder) and the DLL(s) causing the issue.
        Drag and drop files here or click to browse.
