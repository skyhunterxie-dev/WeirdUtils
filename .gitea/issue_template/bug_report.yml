name: Bug Report
about: Report a crash, error, or unexpected behavior
labels:
  - bug
body:
  - type: dropdown
    id: launcher
    attributes:
      label: Launcher
      options:
        - WoW.exe (direct)
        - VanillaFixes.exe
        - Other
      default: 0
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows
        - Linux (Wine)
        - macOS (Wine/CrossOver)
      default: 0
    validations:
      required: true
  - type: textarea
    id: dlls
    attributes:
      label: WeirdUtils DLLs in use
      description: Drag and drop your WeirdUtils DLL file(s) into this box.
      placeholder: "Drag and drop .dll files here"
    validations:
      required: true
  - type: input
    id: other-dlls
    attributes:
      label: Other DLLs loaded
      description: List any other DLLs in your dlls.txt (nampower, SuperWoW, UnitXP, etc.)
      placeholder: "e.g. nampower.dll, UnitXP.dll"
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the issue. Include any error messages or crash details.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
  - type: textarea
    id: crash-log
    attributes:
      label: Crash log
      description: Drag and drop the crash .txt file from your Data/ folder into this box.
      placeholder: "Drag and drop crash .txt file here"
