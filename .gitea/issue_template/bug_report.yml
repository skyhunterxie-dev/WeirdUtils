name: Bug Report
about: Report a crash, error, or unexpected behavior
labels:
  - bug
body:
  - type: dropdown
    id: launcher
    attributes:
      label: Launcher
      options:
        - WoW.exe (direct)
        - VanillaFixes.exe
        - Other
      default: 0
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows
        - Linux (Wine)
        - macOS (Wine/CrossOver)
      default: 0
    validations:
      required: true
  - type: input
    id: dlls
    attributes:
      label: WeirdUtils DLLs in use
      description: Which WeirdUtils DLL(s) are you using?
      placeholder: "e.g. weirdutils.dll, or minimapicons.dll + clickthrough.dll"
    validations:
      required: true
  - type: textarea
    id: other-dlls
    attributes:
      label: Other DLLs loaded
      description: List any other DLLs in your dlls.txt (nampower, SuperWoW, UnitXP, etc.)
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the issue. Include any error messages or crash details.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
  - type: textarea
    id: crash-log
    attributes:
      label: Crash log
      description: Attach the crash .txt file from your Errors/ folder.
  - type: textarea
    id: dll-upload
    attributes:
      label: DLL files
      description: Attach the DLL(s) you are using.
